<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>生活应急保险库 v2.7.1 (私域 CRM 版)</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="生活应急保">

<link rel="apple-touch-icon" href="logo-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="logo-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="logo-512.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
  :root {
    --primary: #2c3e50; --gold: #f1c40f; --accent: #e74c3c;
    --blue-base: #3498db; --green-base: #27ae60; --orange-base: #e67e22;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #ecf0f1; color: #333; margin: 0; padding: 20px; padding-bottom: 90px; transition: padding 0.3s; }
  
  body.shared-mode { padding-bottom: 20px; }
  body.shared-mode .bottom-nav { display: none !important; }
  body.shared-mode .client-manager-box { display: none !important; }

  .container { max-width: 1200px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); overflow: hidden; }
  .header { background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--gold); position: relative;}
  .header h1 { margin: 0; font-size: 1.8rem; font-weight: 900; letter-spacing: 1px;}
  .version-tag { position: absolute; top: 10px; right: 15px; background: var(--gold); color: #2c3e50; font-size: 0.75rem; padding: 5px 8px; border-radius: 6px; font-weight: bold; text-align: right; line-height: 1.3;}
  
  /* 強制更新按鈕樣式 */
  .update-btn { display: inline-block; margin-top: 4px; padding: 2px 6px; background: rgba(0,0,0,0.2); color: #fff; border: 1px solid #fff; border-radius: 4px; font-size: 0.6rem; cursor: pointer; }

  .vip-banner { display: none; background: linear-gradient(135deg, #f39c12 0%, #d35400 100%); color: white; text-align: center; padding: 10px; font-weight: bold; font-size: 1rem; letter-spacing: 1px; }

  .main-grid { display: grid; grid-template-columns: 1fr 1.3fr; gap: 0; align-items: flex-start; }
  @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
  
  .config-panel { background: #f8f9fa; padding: 20px; border-right: 1px solid #eee; }
  .analysis-panel { background: #fff; padding: 20px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  
  .client-manager-box { background: #eaf2f8; border: 1px solid #3498db; border-radius: 8px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
  .client-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .btn-sm { padding: 6px 12px; font-size: 0.8rem; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; color: white; transition: 0.2s;}
  .bg-save { background: #27ae60; } .bg-export { background: #8e44ad; } .bg-import { background: #f39c12; } .bg-del { background: #e74c3c; } 
  .bg-share { background: #3498db; width: 100%; margin-top: 5px; padding: 10px; font-size: 0.95rem; }

  .mode-switch-container { display: flex; gap: 10px; margin-bottom: 20px; background: #ecf0f1; padding: 5px; border-radius: 8px; }
  .mode-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; background: transparent; color: #7f8c8d; }
  .mode-btn.active { background: #fff; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

  .section-title { font-size: 0.95rem; color: #7f8c8d; font-weight: bold; border-bottom: 2px solid #ddd; padding-bottom: 5px; margin: 15px 0; }
  .input-group { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .input-group label { flex: 1; font-size: 0.9rem; color: #555; font-weight: bold;}
  .input-group input, .input-group select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 150px; text-align: right; font-weight: bold; font-size: 1rem; color: #2c3e50;}
  
  .card { border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 15px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.02); transition: 0.2s; border-left: 4px solid #ccc; }
  .card h3 { margin: 0 0 10px 0; font-size: 1rem; color: #333; display: flex; justify-content: space-between;}
  .card.waiver { border-left-color: #27ae60; background: #eafaf1; }

  button { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; margin-bottom: 5px; font-size:0.9rem;}
  .btn-primary { background: #3498db; color: white; }
  .btn-danger { background: #e74c3c; color: white; }
  .btn-warning { background: #d35400; color: white; }
  .btn-success { background: #27ae60; color: white; }
  .btn-dark { background: #2c3e50; color: white; }

  .status-bar { display: flex; justify-content: space-between; background: #f0f3f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 1px solid #ddd;}
  .status-value { font-size: 1.4rem; font-weight: bold; color: #2c3e50; }
  .status-label { font-size: 0.8rem; color: #7f8c8d; }
  
  .log-container { background: #2c3e50; color: #ecf0f1; border-radius: 8px; height: 350px; overflow-y: auto; margin-top: 20px; }
  .log-header { background: #34495e; padding: 10px; font-size: 0.9rem; font-weight: bold; position: sticky; top: 0; z-index: 5;}
  #logList { list-style: none; padding: 0; margin: 0; font-family: monospace; font-size: 0.85rem;}
  #logList li { padding: 8px 10px; border-bottom: 1px solid #46637f; display: flex; justify-content: space-between; }
  
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); display: flex; justify-content: space-around; padding: 10px 0; z-index: 900; border-top: 3px solid var(--gold); }
  .nav-item { flex: 1; text-align: center; color: #7f8c8d; font-size: 0.8rem; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .nav-icon { font-size: 1.4rem; }

  /* 弹窗與圖片縮放 */
  .modal-overlay { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.85); z-index: 999; justify-content: center; align-items: center; padding: 20px; }
  .modal-content { background: #fff; border-radius: 12px; width: 100%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
  .modal-header { padding: 15px 20px; text-align: center; color: white; position: sticky; top: 0; z-index: 10; }
  .modal-header.cancer-bg { background: linear-gradient(135deg, #e67e22 0%, #d35400 100%); }
  .modal-header.combo-bg { background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); }
  .modal-body { padding: 20px; }
  .modal-img { width: 100%; border-radius: 8px; margin-bottom: 20px; cursor: zoom-in; transition: transform 0.2s; }
  .modal-img:active { transform: scale(0.98); }

  /* 圖片全屏燈箱 */
  .zoom-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,1); z-index: 2000; justify-content: center; align-items: center; cursor: zoom-out; }
  .zoom-overlay img { max-width: 98%; max-height: 98%; object-fit: contain; }

  .qr-wrapper { text-align: center; background: #fff; padding: 20px; }
  .qr-wrapper img { display: block; margin: 0 auto; width: 220px; height: 220px;}
</style>
</head>
<body>

<div class="container">
  <div id="vipBanner" class="vip-banner"></div>
  
  <div class="header">
    <h1>🛡️ 家庭生活应急保险库</h1>
    <div class="version-tag">
      v2.7 私域 CRM 版<br>
      <div class="update-btn" onclick="forceUpdateApp()">🔄 強制檢查更新</div>
    </div>
  </div>

  <div class="main-grid">
    <div class="config-panel">
      <div class="client-manager-box">
        <div class="section-title" style="margin-top: 0; color:#2980b9;">👤 专属客户档案库</div>
        <div class="input-group">
          <label>读取档案</label>
          <select id="clientSelect" onchange="loadSelectedClient()"><option value="">-- 选择已保存客户 --</option></select>
        </div>
        <div class="input-group">
          <label>客户/方案名</label>
          <input type="text" id="clientNameInput" placeholder="如: 王总方案A">
        </div>
        <div class="client-actions">
          <button class="btn-sm bg-save" onclick="saveClientData()">💾 保存</button>
          <button class="btn-sm bg-del" onclick="deleteClientData()">🗑️ 删除</button>
          <button class="btn-sm bg-export" onclick="exportClientData()">📤 导出</button>
          <button class="btn-sm bg-import" onclick="document.getElementById('importFile').click()">📥 导入</button>
          <input type="file" id="importFile" style="display:none" accept=".json" onchange="importClientData(event)">
        </div>
        <button class="btn-sm bg-share" onclick="generateShareQR()">📲 生成专属沙盘二维码</button>
      </div>

      <div class="mode-switch-container">
        <button class="mode-btn active" id="btnAdultMode" onclick="setMode('adult')">👨‍💼 顶梁柱模式</button>
        <button class="mode-btn" id="btnChildMode" onclick="setMode('child')">👶 吞金兽模式</button>
      </div>

      <div class="section-title">💼 基础配置</div>
      <div class="input-group">
        <label>显示货币</label>
        <select id="currencySelect" onchange="changeCurrency()">
          <option value="USD">美元 (USD)</option>
          <option value="CNY">人民币 (CNY)</option>
        </select>
      </div>
      <div class="input-group">
        <label>投保年龄</label>
        <input type="number" id="startAge" value="30">
      </div>
      <div class="input-group">
        <label>重疾保额</label>
        <input type="text" id="sumWhole" value="1,000,000" onkeyup="formatMoneyInput(this)">
      </div>
      <button class="btn-dark" onclick="initDashboard()">✅ 生成专属沙盘</button>

      <div class="section-title" style="color:#c0392b;">🎯 实战理赔推演</div>
      <div class="card" style="border-left-color: #f39c12;">
        <h3>🩺 轻疾理赔 (20%)</h3>
        <button class="btn-warning" onclick="triggerEarlyStage()">提取轻疾理赔金</button>
      </div>
      <div class="card">
        <h3>🚨 首次重疾打击 (100%)</h3>
        <button class="btn-danger" id="btnFirstClaim" onclick="triggerFirstClaim()">一键启动首次重疾</button>
      </div>
      <div class="card" style="border-left-color: #e67e22;">
        <h3>🧬 癌症持久战</h3>
        <button class="btn-primary" onclick="triggerCancerLump()">方案 A: 一次性复发</button>
        <button class="btn-warning" onclick="triggerCancerCash()">方案 B: 启动抗癌月薪</button>
      </div>
      <div class="card" style="border-left-color: #8e44ad;">
        <h3>❤️ 心脑血管危机</h3>
        <button class="btn-primary" style="background:#8e44ad;" onclick="triggerHeartStroke()">推演心脏病/中风</button>
      </div>
      <div id="adultControls">
        <div class="card waiver">
          <h3>💍 配偶豁免</h3>
          <button class="btn-success" onclick="triggerWaiver('spouse')">⚠️ 假设配偶发生意外</button>
        </div>
      </div>
      <div id="childControls" style="display:none;">
        <div class="card waiver">
          <h3>👨‍👩‍👦 父母双豁免</h3>
          <button class="btn-success" onclick="triggerWaiver('parent')">🚨 父母意外</button>
        </div>
      </div>
    </div>

    <div class="analysis-panel">
      <div class="status-bar" id="waiverStatusBar">
        <div><div class="status-label">当前年龄</div><div class="status-value" id="dispAge">30</div></div>
        <div><div class="status-label">总赔付</div><div class="status-value" style="color:#e74c3c;" id="dispTotalClaim">$0</div></div>
        <div><div class="status-label">状态</div><div class="status-value" style="color:#27ae60;" id="dispPayStatus">正常</div></div>
      </div>
      <div class="card" style="border-left:none; background:#f8f9fa;">
        <h3 style="color:#2c3e50;">💡 TOT 顾问洞察</h3>
        <p id="insightText">点击生成沙盤開始推演。</p>
      </div>
      <div class="log-container">
        <div class="log-header">📜 事件日志</div>
        <ul id="logList"></ul>
      </div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="closeAllModals()">
    <span class="nav-icon">📊</span><span>理赔沙盘</span>
  </div>
  <div class="nav-item" onclick="showModal('cancerModal')">
    <span class="nav-icon">🧬</span><span>癌症双轨</span>
  </div>
  <div class="nav-item" onclick="showModal('threeInOneModal')">
    <span class="nav-icon">🛡️</span><span>三合一底盘</span>
  </div>
</div>

<div id="cancerModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header cancer-bg"><h2>癌症理賠雙軌制</h2></div>
    <div class="modal-body">
      <img src="https://i.postimg.cc/mDhxFT8W/癌症方案A.jpg" class="modal-img" onclick="zoomImg(this.src)">
      <img src="https://i.postimg.cc/ydWqS7v4/癌症方案B.jpg" class="modal-img" onclick="zoomImg(this.src)">
      <button onclick="closeAllModals()">关闭</button>
    </div>
  </div>
</div>

<div id="threeInOneModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header combo-bg"><h2>三合一底盤保障</h2></div>
    <div class="modal-body">
      <img src="https://i.postimg.cc/3RWMD3nH/重疾三合一.jpg" class="modal-img" onclick="zoomImg(this.src)">
      <img src="https://i.postimg.cc/RFqrnvXr/重疾賠完后.jpg" class="modal-img" onclick="zoomImg(this.src)">
      <button onclick="closeAllModals()">关闭</button>
    </div>
  </div>
</div>

<div id="shareQRModal" class="modal-overlay">
  <div class="modal-content" style="max-width:350px;">
    <div class="qr-wrapper">
      <div id="qrcode-source" style="display:none;"></div>
      <img id="final-qr-img" src="">
      <p>扫码分享此方案</p>
      <button onclick="closeAllModals()">关闭</button>
    </div>
  </div>
</div>

<div id="zoomOverlay" class="zoom-overlay" onclick="this.style.display='none'">
  <img id="zoomedImg" src="">
</div>

<script src="script.js"></script>
<script>
  // 註冊 Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        console.log('SW 註冊成功');
      });
    });
  }
</script>
</body>
</html>
